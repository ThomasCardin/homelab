apiVersion: apps/v1
kind: Deployment
metadata:
  name: gobservability-server
  namespace: gobservability
  labels:
    app: gobservability-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gobservability-server
  template:
    metadata:
      labels:
        app: gobservability-server
    spec:
      imagePullSecrets:
        - name: ghcr-secret

      containers:
      - name: server
        image: ghcr.io/thomascardin/gobservability-server:latest
        imagePullPolicy: Always

        args:
        - "./server"
        - "-port=8080"
        - "-grpc-port=9090"
        - "-mode=release"

        ports:
        - name: http
          containerPort: 8080
        - name: grpc
          containerPort: 9090

        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-user-secret
              key: username

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-user-secret
              key: password

        - name: POSTGRES_URL
          value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@gobservability-postgres-rw.gobservability.svc.cluster.local:5432/gobservability?sslmode=disable

        - name: DISCORD_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: discord-webhook
              key: webhook_url

        - name: GIN_MODE
          value: release

        resources:
          requests:
            cpu: 250m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: gobservability-server
  namespace: gobservability
  labels:
    app: gobservability-server
spec:
  type: ClusterIP
  selector:
    app: gobservability-server
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: grpc
    port: 9090
    targetPort: 9090