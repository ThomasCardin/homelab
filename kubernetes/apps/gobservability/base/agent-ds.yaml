apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gobservability-agent
  namespace: gobservability
  labels:
    app: gobservability-agent
spec:
  selector:
    matchLabels:
      app: gobservability-agent
  template:
    metadata:
      labels:
        app: gobservability-agent
    spec:
      serviceAccountName: gobservability-agent
      hostPID: true

      imagePullSecrets:
        - name: ghcr-secret

      containers:
      - name: agent
        image: ghcr.io/thomascardin/gobservability-agent:latest
        imagePullPolicy: Always

        args:
        - "./agent"
        - "-grpc-server=gobservability-server:9090"
        - "-interval=30s"
        - "-hostname=$(NODE_NAME)"

        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName

        resources:
          requests:
            cpu: 100m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 64Mi

        securityContext:
          privileged: true
          capabilities:
            add:
              - SYS_ADMIN
              - SYS_PTRACE
              - SYS_RAWIO

        volumeMounts:
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true

      volumes:
      - name: proc
        hostPath:
          path: /proc
      - name: sys
        hostPath:
          path: /sys